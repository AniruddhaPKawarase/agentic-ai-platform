# Agentic AI Platform — Docker Compose
# NOTE: This is a skeleton. Each agent needs its own Dockerfile.

version: "3.9"

services:
  gateway:
    image: nginx:1.25-alpine
    ports:
      - "8000:8000"
    volumes:
      - ./agents/gateway/nginx/vcs-agents.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rag-engine
      - sql-engine
      - doc-generator
      - ingestion
      - doc-qa
      - health-service
    restart: always

  rag-engine:
    build: ./agents/rag-engine
    ports:
      - "8001:8001"
    env_file: ./agents/rag-engine/.env
    restart: always
    # TODO: Add Dockerfile to agentic-rag-engine

  sql-engine:
    build: ./agents/sql-engine
    ports:
      - "8002:8002"
    env_file: ./agents/sql-engine/.env
    restart: always
    # TODO: Add Dockerfile to agentic-sql-engine

  doc-generator:
    build: ./agents/doc-generator
    ports:
      - "8003:8003"
    env_file: ./agents/doc-generator/.env
    restart: always
    # TODO: Add Dockerfile to agentic-doc-generator

  ingestion:
    build: ./agents/ingestion
    ports:
      - "8004:8004"
    env_file: ./agents/ingestion/.env
    restart: always
    # TODO: Add Dockerfile to agentic-ingestion-pipeline

  health-service:
    build: ./agents/gateway/health_service
    ports:
      - "8005:8005"
    restart: always
    # TODO: Add Dockerfile to health_service

  doc-qa:
    build: ./agents/doc-qa
    ports:
      - "8006:8006"
    env_file: ./agents/doc-qa/.env
    restart: always
    # TODO: Add Dockerfile to agentic-doc-qa
